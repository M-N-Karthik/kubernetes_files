apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deploy
  labels: 
    app: nginx
  annotations:
    deployment.kubernetes.io/revision: "update to new 1.27.0-alpine image"
spec:
  replicas: 5   
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: nginx-deploy
  template:
    metadata:
      labels:
        app: nginx-deploy
    spec:
      containers:
      - name: nginx-container
        image: nginx:1.27.0-alpine
        ports:
        - containerPort: 80
